[alembic]
# Path to migration scripts
script_location = alembic

# Database URL
sqlalchemy.url = postgresql://postgres:postgres@localhost/moviedb
# sqlalchemy.url = postgresql://fastuser:success%%40321@localhost/fast_api

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
